<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Próximos eventos en Sereno · Café y restaurante en Bogotá.">
<title>Próximos eventos · Sereno</title>
<link rel="icon" type="image/png" href="logo-sereno.png">

<style>
  @font-face {
    font-family: 'Inter';
    src: url('Inter-VariableFont.ttf') format('truetype-variations');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Skywalks';
    src: url('Skywalks.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --crema: #F1F1E7;
    --sombra: #353432;
    --sombra-soft: #5A5956;
    --sombra-mute: #8A8885;
    --line: rgba(53, 52, 50, 0.12);
    --line-strong: rgba(53, 52, 50, 0.28);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--crema);
    color: var(--sombra);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.3;
    mix-blend-mode: multiply;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.21 0 0 0 0 0.20 0 0 0 0 0.20 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .page {
    position: relative;
    z-index: 2;
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 22px 60px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: fadeUp 0.6s ease-out both;
  }
  .back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sombra);
    text-decoration: none;
    padding: 9px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    transition: all 0.4s ease;
  }
  .back:hover { background: var(--sombra); color: var(--crema); border-color: var(--sombra); }
  .back svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.6; }
  .brand img { height: 26px; display: block; }

  .hero {
    text-align: center;
    padding: 20px 0 36px;
    animation: fadeUp 0.8s ease-out 0.1s both;
  }
  .hero-title {
    font-family: 'Skywalks', serif;
    font-weight: 400;
    font-size: clamp(56px, 14vw, 88px);
    line-height: 1;
    letter-spacing: -0.01em;
    color: var(--sombra);
  }

  .events {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .event-card {
    position: relative;
    display: block;
    border-radius: 4px;
    overflow: hidden;
    background: var(--sombra);
    aspect-ratio: 4 / 5;
    text-decoration: none;
    color: inherit;
    animation: fadeUp 0.9s ease-out 0.2s both;
    border: 1px solid var(--line);
  }
  .event-card-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .event-card:hover .event-card-img { transform: scale(1.04); }

  .event-card-meta {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 2;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(241, 241, 230, 0.9);
    background: rgba(53, 52, 50, 0.35);
    border: 1px solid rgba(241, 241, 230, 0.3);
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }
  .event-card-meta .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #E8E5D8;
    box-shadow: 0 0 0 3px rgba(232, 229, 216, 0.2);
  }

  .event-card-foot {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 22px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    z-index: 2;
    color: var(--crema);
    background: linear-gradient(180deg, rgba(53,52,50,0) 0%, rgba(53,52,50,0.0) 40%, rgba(53,52,50,0.55) 80%, rgba(53,52,50,0.75) 100%);
  }
  .event-card-when {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.01em;
    opacity: 0.95;
  }
  .event-card-arrow {
    width: 22px; height: 22px;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .event-card:hover .event-card-arrow { transform: translateX(4px); }
  .event-card-arrow svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.2; }

  .empty {
    margin-top: 28px;
    text-align: center;
    padding: 40px 20px;
    font-family: 'Skywalks', serif;
    font-weight: 400;
    font-size: 22px;
    color: var(--sombra-mute);
    border: 1px dashed var(--line-strong);
    border-radius: 4px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .page { padding: 24px 20px 40px; }
    .hero { padding: 12px 0 24px; }
    .event-card-foot { padding: 18px 18px; }
    .event-card-meta { top: 16px; left: 16px; font-size: 10px; padding: 6px 12px; }
  }

  .back:focus-visible, .event-card:focus-visible {
    outline: 2px solid var(--sombra);
    outline-offset: 3px;
  }
</style>
</head>
<body>

<main class="page">

  <div class="topbar">
    <a href="index.html" class="back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver
    </a>
  </div>

  <section class="hero">
    <h1 class="hero-title">Próximos eventos</h1>
  </section>

  <div class="events">

    <a href="evento-yoga-brunch.html" class="event-card" aria-label="Yoga and Brunch, domingo 24 de mayo">
      <div class="event-card-img" style="background-image: url('evento-yoga-brunch.jpg');"></div>
      <span class="event-card-meta"><span class="dot"></span>Domingo 24 · Mayo</span>
      <div class="event-card-foot">
        <span class="event-card-when">10:00 am — 1:00 pm</span>
        <div class="event-card-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </div>
      </div>
    </a>

  </div>

</main>

</body>
</html>
